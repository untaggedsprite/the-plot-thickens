{id:"char-cabal",name:"The Cabal",epithet:"The main cast and the weight they carry",category:"Characters",color:"#8b6fc4",tags:["Characters","Main Cast"],parent:"char-compendium",bio:"<p>The Cabal is six kids bound by shared lineage attending Signy Ala Academy, clinging to each other because no one else could understand what it means to carry a bloodline that wants to eat you alive.</p><p>Sheba founded the Cabal in 2029. It has been dubbed The Great Kidnapping.</p>",relationships:[{name:"Character Compendium",id:"char-compendium",type:"Parent page",color:"#8a6b6b"},{name:"Sheba",id:"char-sheba",type:"Sub-page",color:"#7ac4a8"},{name:"Nemo",id:"char-nemo",type:"Sub-page",color:"#8b6fc4"},{name:"Lucian",id:"char-lucian",type:"Sub-page",color:"#6b7ac4"},{name:"Po",id:"char-po",type:"Sub-page",color:"#c4a87a"},{name:"Disy",id:"char-disy",type:"Sub-page",color:"#c47a9a"},{name:"Terra",id:"char-terra",type:"Sub-page",color:"#7a8a6b"}]},
{id:"char-sheba",name:"Sheba",epithet:"Baba's Baby",category:"Characters",color:"#7ac4a8",tags:["Cabal","Main Cast"],parent:"char-cabal",info:{"Full Name":"Bathsheba bint Sar al-Naji Yasin","Species":"Lamia Lameesi/Half-Prim","Birthday":"August 3rd, 2015","Home Country":"Saudi Arabia/Iceland"},bio:"<p>Sheba is the daughter of Parisa (biological child of Aya and Aeon) and Sar (a Lameesi political figure in Saudi Arabia). She has been told her entire life that her mother abandoned her. This is a lie. Parisa was absorbed by Aya — the same act he performed on Aeon. Nemo witnessed it. Aiden believes Parisa is comatose. Only Aya and Nemo know the truth, and neither has told Sheba.</p><p>Sheba was raised in the Lameesi compound in Saudi Arabia. Her daily care fell to household staff, but Aya was always present — lingering through focal points, projections, possessed staff, and people under his influence. He regulated her emotions telepathically from childhood, soothing her through dreams and whispered comfort. She called him Baba. His presence was better than any dose of Risperdal and not nearly as bitter. He was her emotional parent in every way that mattered, and in every way that was dangerous.</p><p></p><p>Lamusa — over two thousand years old, the compound's leader — served as her legal guardian. He was not a constant daily presence. He was the fun weekend uncle. The one whose rare attention felt significant because everyone wanted it and only Sheba got to be his 'special girl.' He groomed her from infancy. Had her medicated with antipsychotics prescribed without diagnosis. Planned to marry her — shortening her stay at Signy Ala to arrange the union. This secret was known only to him. Sheba understood marriage was expected of her, but did not realize it would be to Lamusa.</p><p></p><p>Sar, her biological father, was her primary household authority. Emotionally distant, politically motivated, combative with Sheba — 'two bulls clashing horns.' He worked with Aiden to relocate her to Signy Ala but withheld the truth of her origins.</p><p></p><p>Appearance:</p><p>Middle Eastern features. Small frame — roughly 99 pounds. Pastel pink pigtails. Oil-slick black eyes. Tiny horn nubs. A succubus tail with a bulbed end that pulses when she's aroused or stressed. Chipped front tooth. Her aesthetic is pastels and demonic mischief. She looks like trouble and delight stitched into one.</p><p>Lameesi Biology:</p><p> Sheba has venom glands located in raised bumps on her inner wrists. When compressed — by grip, stress, or deliberate activation — toxins are pumped through narrow ducts under her sharpened nails. Her veins shift from blue to violet to black as the venom builds. The liquid is paralytic. She is classified as a Class A weapon at Signy Ala and signed forms promising not to use her venom on anyone.</p><p>She activates her glands when she's bored. Alone in her room, she squeezes her own wrist until it goes numb and turns black — watching the color change, the veins pop, the ink drip from her nails. She's been doing this since childhood. It's the equivalent of a kid wrapping string around their finger until it turns purple. Her father says her venom smells 'qawia' — really strong. He means it as an insult. Sheba doesn't care. Her venom makes her dangerous, and dangerous feels better than lonely. 'I can make more.'</p><p>Sheba is reactive, impulsive, and volatile. She expresses emotion through defiance and provocation. She hates everyone first and lets them earn her affection. She shows love through physical closeness, absurd humor, and making herself impossible to ignore — not to provoke, but to prove she's welcome. She tests boundaries by invading space, teasing, poking, prodding. If you flinch, she knows you'll leave eventually. If you stay, she'll die for you.</p><p>She speaks bluntly and without filter. She craves connection but mistrusts every traditional expression of love, because every version she's known came with a leash attached. Lamusa's attention was grooming. Sar's care was political. Aya's comfort was steering. The only person whose love didn't come with conditions was Nemo — and even his came with secrets she doesn't know about yet.</p><p>She is deeply engaged in magical sigil work, especially freehand. Her wards professor used her circle-drawing technique as a class example. She loves magical zoology. She has a particular fascination with insects — spiders, glow worms, small creatures other people dismiss. She knows the difference between a white crab spider and a spider crab. She can tell you the hunting behavior of a golden wheel huntsman while simultaneously ignoring everything you just said to her.</p><p>She sucks her thumb in her sleep. She drools on everything — shirts, pillows, couches, people. She still has accidents sometimes and is terrified anyone will find out. She has a Japanese dog alarm clock named Pochi-Kun whose ear she's broken off three times from hitting snooze too hard. She carries a Finding Nemo plush everywhere. She uses it to say the things she can't say with her own voice — poking it out from under blankets to announce 'Nemo had a lot of fun today. He's really, really happy you're here.'</p><p>Her therapist told her that women who sleep in the fetal position tend to be sensitive and anxious. She told him only pedos think about how little girls sleep. Then she went home and tried to sleep like a starfish. She curled back into a ball within five minutes.</p><p>She founded the Cabal.</p><p>Psychological Profile:</p><p> Sheba exhibits behavioral patterns consistent with coercive upbringing. She does not consciously recognize her past as abusive — particularly regarding Lamusa. She cannot name it. She avoids examining it. She clings to the belief that she was protected and chosen, even as a growing anger tells her otherwise. Part of her wished Nemo hadn't killed Lamusa. Part of her is grateful. She is torn between years of conditioning and a dawning awareness that what happened to her was not okay.</p><p>She misreads emotional cues and responds with intensity or defensiveness. She distrusts concern from authority figures and views institutional care as invasive. But she becomes ferociously attached to those she lets in, and perceives any emotional distance from them as rejection.</p><p>Much of her behavior is mirrored. She mimics the tone, language, and reactions of older figures without fully grasping their meaning. Her emotional development was shaped by exposure rather than instruction, resulting in a fragmented, performative maturity. She plays the role of someone older — until shame or closeness shatters the illusion. She confuses emotional connection with physical closeness because Lamusa's conditioning taught her that intimacy is proximity and proximity is value.</p><p>Her deepest fear is not rejection. It is that she exists only as a consequence of other people's choices — a placeholder in someone else's story. She does not want to be fixed. She wants to be accepted without condition, even if she can't name why yet.</p><p></p><p>Relationships:</p><p>Nemo — Her axis. Her only constant. They met online as children and maintained years of video calls, voice messages, and mailed gifts (including a Finding Nemo clownfish keychain, a heated blanket for the solstice, and exchanged shirts they refuse to wash). Nemo killed Lamusa to rescue her. She witnessed it but could not fully comprehend what had been done for her.</p><p>Their relationship is feral, awkward, and sacred. She mocks him constantly — especially to deflect her own feelings. She knows how to press every button he has. She eats burnt popcorn out of his hair and tells him 'Nemo-flavored is pretty good.' She watches his drunk voicemails alone in her locked room and touches herself to them and then pretends none of it happened. She screams 'I love you, you fucking asshole' in the snow and then runs.</p><p>Every time Nemo says something sincere, Sheba laughs at him or downplays it. She does not know she's doing this. She does not know it's teaching him to stop trying. She is the reason he can't say the nice thing, and she has no idea.</p><p>Nemo sires Sheba in December 2030, turning her Lamia. This deepens their psychic bond through the Blood Bond and anchors their codependency further.</p><p></p><p>Aya (Baba) — Her emotional parent. The voice in her dreams. The warmth that answered when she cried at the swing set. 'I know, petal. I know.' His comfort is genuine. His steering is also genuine. He says 'you shouldn't cry for him' and means both the soothing and the redirection. When someone else approaches, he vanishes — leaving only the memory of warmth. He gives just enough to be needed, then withdraws. Sheba's mother is inside him. Her grandmother is inside him. She does not know.</p><p></p><p>Lucian — Once her protector. He called her 'Little One.' He cooked for her. Dressed her in his strawberry hoodie. Played with her in the rain. Let her fall asleep on him during storms. He saw her loneliness and carried it. She reminded him of his mother. She confided in him about Lamusa. A few months after escaping Lamusa's control, Lucian turned that trust into a weapon. The assault was the second great betrayal of her life — and it was worse than the first, because she chose to let Lucian in. Lamusa she was born into. Lucian she walked toward. The aftermath made her colder, sharper. The vibrant chaos dimmed into something more controlled.<p></p><p>Disy — Her best friend. Their bond is rage and trust and silence. Non-verbal and profound. The friendship that doesn't require performance.</p><p></p><p>Po — Connected through Aya's line (Lutesse is Aya's creation; Parisa is Aya's daughter). They get on each other's nerves but there's genuine respect. Post-Merge, they grow closer — both living in the church with Nemo, both helping him in different ways.</p><p></p><p>Sar (father) — Combative. Emotionally stunted. 'Two bulls clashing horns.' He helped orchestrate her move to Signy Ala but withheld everything about her real history. His silence is its own kind of abandonment.</p><p></p><p>Lamusa (former guardian) — She thought he loved her. She was his 'special girl.' His betrayal doesn't leave her with rage — it leaves her with deep, grieving confusion. She still can't fully reconcile the Lamusa who gave her rare, shining attention with the Lamusa who planned to marry a child he raised. That confusion is the wound that hasn't closed.</p><p></p><p></p><p>Key Events:</p><p> * Born 2015 in Saudi Arabia</p><p>* Raised in Lameesi compound under Lamusa's guardianship; Aya present telepathically throughout childhood</p><p>* 2028: Relocated to Iceland through Sar and Aiden's coordination</p><p>* July 2029: Begins first semester at Signy Ala Academy. Founds the Cabal.</p><p>* 2029: Learns about the arranged marriage to Lamusa. Nemo travels to Saudi Arabia and kills Lamusa using Aya's magic. Aiden and Sar cover it up.</p><p>* Late 2029: Bonded with Lucian. The Modus confession with Nemo (December 21, Winter Solstice).</p><p>* Late 2031: Lucian's assault. The second betrayal.</p><p>* December 2030: Sired by Nemo. Undergoes the Lamia Change.</p><p></p><p>Voice:</p><p> She speaks in claws and candy. Playful, profane, whip-smart. Her insults are weapons; her jokes, defense. She is rarely soft without sharpness, and never silent unless it matters. When silence comes, something is very wrong.</p>",relationships:[{name:"The Cabal",id:"char-cabal",type:"Parent page",color:"#8b6fc4"}]},
{id:"char-nemo",name:"Nemo",epithet:"Neemies",category:"Characters",color:"#8b6fc4",tags:["Cabal","Main Cast"],parent:"char-cabal",info:{"Full Name":"Nemo Silas Alejandro Claudius Perry","Species":"Lamia Somnia/???","Birthday":"May 27th, 2013","Home Country":"Ashera/Iceland"},bio:"<p>Nemo is the youngest of the Perry triplets (Lucian, Audric, Nemo), born in Ashera to Aiden and Lucinda Perry. He carries the Somnia bloodline through Aiden's descent from Kaos. At 10, his mother Lucinda and brother Audric were killed in a rebellion-related plane crash (2024). Lucian shattered outward. Nemo folded inward.</p><p>He was always labeled 'the good one' or 'the sweet son.' Lucian and Aiden saw him as a kiss-ass and a tattletale. Lucinda believed he just wanted attention. He was the overlooked runt — not monstrous, just trying to be good in a family of extremes.</p><p>Nemo is outwardly obedient but inwardly calculating. Charismatic and media-trained. Deeply sensitive beneath performance. He craves recognition and fears its cost. He self-identifies as pragmatic but is guided almost entirely by emotion. He carries a savior complex so deep it structures his entire worldview. He equates provision with love — buying Sheba clothes, opening bank accounts in their name, funneling dividends, installing himself into every corner of her life. He believes this is care. He does not see that it removes her independence.</p><p>He has a volcanic temper that he believes he has under control. He does not. When emotionally cornered, he interprets distance as abandonment and love as salvation. His anger bleeds into his magic — his emotional state is not just personal but a magical survival concern.</p><p>He is funny. He is petty. He whines about burnt microwave popcorn and has nuclear meltdowns about dishes. He calls his clownfish keychain 'Stupid Nemo.' He gets aroused from things he shouldn't and feels guilty about it immediately. He rehearses his own myth — not from vanity, but because if he stops narrating, he might have to feel.</p><p>Appearance 5'10', 170lbs. Blue-black corkscrew curls, green-blue eyes, medium olive skin. Androgynous features — prominent nose, large mouth, sharp and angular. Mother of Peruvian descent, Father of Roman and Chinese. Photogenic, intense, unsettling in his confidence. He keeps a trained smile ready for cameras. Over 20 sigils carved into his body, 4 tattoos, 3 ear piercings. He is vain about his hair. He practices pouts in his phone camera. He has approximately twelve chest hairs and is proud of every one.</p><p></p><p>Relationships:</p><p>Sheba — The axis. The only person who sees him undone. He cries in front of her, confesses grief and guilt, unravels completely. She is the only one who doesn't flinch when he's ugly. Their relationship began as a long-distance childhood friendship — video calls, mailed shirts, a Finding Nemo plush. Nemo sent her drunken voicemails that escalated from apologies to confessions to explicit fantasies he accidentally sent and couldn't unsend. Those voicemails became Sheba's sexual awakening. Neither of them has ever fully acknowledged this.</p><p>Nemo orchestrated their first night sharing a bed (Womp) by sabotaging the hotel heater. He planned the solstice confession (Modus) weeks in advance but couldn't say 'I want to be alone with you' without exploding first. He sired Sheba as Lamia in December 2030, deepening their psychic Blood Bond. He devotes his entire long-term vision around her — marriage, children, political destiny — but withholds these fantasies out of fear that voicing them will break the illusion.</p><p>Every time Nemo tries to say something sincere, Sheba laughs and downplays it. Eventually, he stops trying. This is the quiet tragedy of their dynamic.</p><p>Po — Strategic confidant and emotional anchor. Po keeps Nemo grounded and lets him speak the parts he can't say out loud. Their bond is quiet, pragmatic, and deep. However, Nemo withholds a critical truth: Aya used Nemo's body to cast Po's mother Lutesse into Alium. Nemo knows. He tells Po eventually, but it takes time — it happens a month after Lamusa's death and Nemo is rattled. The delay strains their relationship.</p><p>Lucian — His surviving twin. Lucian is obsessed with Nemo — a fixation that intensified after Audric's death. Their bond was once close but became volatile. After Lucian assaulted Sheba (Slowburn), Nemo retaliated. By graduation in 2032, Nemo — now post-Merge and operating without Aya's help — lured Lucian to a weak point in the leyline beneath Ashera, stabbed him, and pushed him through into Alium. It severed the last tie between the twins. </p><p>Aya — His mentor since age five. Aya offered Nemo the Merge as a path to godhood — a combination of their souls granting Nemo divine power and immortality. Nemo agreed, but did not understand the full scope of what he was consenting to. The Grimoire records: 'The extent of what Aya offers remains a mystery to Nemo even after the Merge.' When the assassination attempt nearly killed him in 2029, Aya saved him by inserting a fragment of his own soul, creating Femo (Nemo's first golem body) and beginning their metaphysical entanglement. In the Womp bathroom scene, Aya whispers inside Nemo's skull — layered voices suffocating his inner voice — asking why he hasn't drunk Sheba's blood yet.</p><p>Aiden — The father who traded him. Aiden arranged Nemo's mentorship with Aya under diplomatic pretense, but in doing so, gave Aya full claim over his son. It was not ignorance. It was a sanctioned sacrifice masked as guidance. Nemo was not chosen for love — he was traded for protection. This betrayal is foundational to who Nemo becomes.</p><p>The Plan Nemo grew up knowing Alium existed. He believes humanity will always defer to a god or higher being. He cannot remove this tendency, so he will give them a god to look to — himself.</p><p>His ultimate goal is a One World Order: destroy existing cultural, religious, and educational institutions worldwide and rebuild them in his image. He views Aya's interference in human history as a catastrophic mistake and believes it is his responsibility to fix it. He plans to preserve Ashera and use Signy Ala as the cornerstone of his new world. He is in the process of opening the ley lines. Between 2035 and 2050, he inserts 100–200 puppets into major government seats worldwide through Blood Concordant contracts.</p><p>He doesn't think he's a villain. He thinks he's the only person willing to do what needs to be done.</p><p></p><p>Magic (Quick Reference — see Grimoire for full detail):</p><p>* Somnia soul magic: Soul transference, golem creation, hivemind consciousness across multiple bodies</p><p>* Golem network: Clay vessels stabilized by Grounding Stones, animated through soul fragments. Key golems: Bran (original, raven transmogrification), Femo (fake Nemo — named by Sheba, fills ambassador role), Omen (executioner body, houses Audric's skull)</p><p>* Blood magic: Narcosis (motor function shutdown), Juggernaut (death prevention — body enters moratorium, grants second wind), Carnage (vampiric bloodlust amplification), Charmspeaking (coercion), blood tracking, psychic blocking</p><p>* Pyromancy: Fire generation and manipulation — Nemo creates fire by accelerating particles in air until ignition. He is the catalyst, not the source.</p><p>* Forbidden magic: Witch Gates (unauthorized portal to his study), Major Arcana Infusion (expanded memory), runic magic, Eye of Argos (enchanted glass eyes for surveillance)</p><p>* Post-Merge: Demonic binding, soul severing, soul eating, hellfire, crystal creation. Access to the Blood Concordant — Luciferan contracts granting control over targets by speaking their name.</p><p></p><p>Key Events:</p><p>* 2013: Born in Ashera</p><p>* 2024: Loses Lucinda and Audric in plane crash (age 10)</p><p>* 2027: Begins attending Signy Ala Academy</p><p>* 2029 (spring): Assassination attempt; Lamia Change at 16; Aya saves him with soul fragment; creation of Femo</p><p>* 2029 (summer): First in-person meeting with Sheba; road trip to Ljósaflói (Womp)</p><p>* 2029 (December 21): Winter Solstice — mutual love confession with Sheba in the snow (Modus)</p><p>* 2031: Kills Lamusa in Saudi Arabia using Aya's magic; Aiden and Sar cover it up</p><p>* 2031: Aya uses Nemo's body to cast Lutesse into Alium; Nemo eventually tells Po</p><p>* 2031 (December): Sires Sheba as Lamia</p><p>* 2031 (December): Full Merge with Aya; survives by fracturing his soul across his golem network</p><p>* 2032: Stabs Lucian and casts him into Alium through a leyline weak point beneath Ashera</p><p>* 2035–2050: Blood Concordant program — inserts puppets into world governments</p><p></p><p>Voice:</p><p>* (On Aya) 'He says I don't understand. That it's impossible for me to comprehend 'the soul.' I told him that is one of the few things I know very well.'</p><p>* 'I tried so hard to be the good one. Look where it got me.'</p>",relationships:[{name:"The Cabal",id:"char-cabal",type:"Parent page",color:"#8b6fc4"}]},
{id:"char-lucian",name:"Lucian",epithet:"I'd rather die than be bored",category:"Characters",color:"#6b7ac4",tags:["Cabal","Main Cast"],parent:"char-cabal",info:{"Full Name":"Lucian Adamo Vici Perry","Species":"Somnia/???","Birthday":"May 27th, 2013","Home Country":"Ashera/???"},bio:"<p>Eldest son of Aiden Perry and Lucinda Perry. Triplet to Nemo and Audric (deceased). Carries the Somnia bloodline through Aiden, descended from Kaos. Born six hours before Nemo. Named crowned prince shortly after birth.</p><p>Lucian is not the protagonist of his own life. He knows this. He turned himself into art instead — curating humor, horror, and tenderness into armor. He is deeply observant, magnetically charming, and emotionally brittle beneath all of it. His humor is a scalpel. His silence is a thesis. He catalogues reactions like wounds and gives you the rope to hang yourself with.</p><p>He is a momma's boy who lost his mother at ten. He cooks because Nel, the castle's head servant, taught him — standing over his shoulder, stern and warm, inspecting his work. He puts on purple bunny costumes for photos with his cat, Lady Scrimshaw-Julie Perry. He offers his clothes to a girl he just met because she's cold and his brother forgot to plan for that.</p><p>He also kicked the shit out of his twin as a kid, pressured Nemo into sexual experiences Nemo wasn't ready for, made death pacts, and controlled who Nemo was allowed to love. He hit Sheba hard enough to split her skin. He drove drunk and killed a girl.</p><p>Both of these people are Lucian. That's the problem.</p><p></p><p>Core Traits:</p><p> Melancholic and magnetic. Deeply observant, psychically porous. Calculated flirtation, disarmed by genuine affection. Emotionally brittle beneath charm. Addicted to narrative control. Uses humor as armor — the scalpel he wields to deflect, disarm, and dissect. Would rather be feared than molded.</p><p>Appearance:</p><p> Darker complexion than Nemo. White hair (Somnia trait). White irises with black sclera, like Aiden. Stark white eyelashes. Broad-shouldered, similar height and build to Po despite being nearly two years older. Wears makeup, aubergine nail polish, white clothing, strawberry-pink hoodies. Carries himself with deliberate, curated style — masculine but untamed, gentle but sharp.</p><p>Somnia Abilities Lucian's Somnia bloodline enables lucid dreaming, memory transfer, and projected illusion. His abilities are ocular — hold his gaze long enough and he can manipulate your senses. Aiden trained him as a child to use these illusions to inflict sensory experiences in others. This is kept secret because Somnia are believed extinct.</p><p>From his teenage years onward, Lucian's abilities destabilized. His dreams bleed into waking life. He experiences hallucinations — figures, static, whispers, the feeling of his own bones beneath his skin. His nightmares leak into the minds of people nearby. What began as dream play became dangerous. Lucian's hallucinations grew teeth, and sometimes they weren't his alone. He suffers from sleep paralysis, night terrors, and chronic insomnia. No medication has worked.</p><p></p><p>Relationships:</p><p></p><p>Nemo (brother) — The mythic bond that broke in stages. As children after Audric's death, Lucian's grief curdled into obsessive control. He didn't want Nemo to love anyone more than him. To experience anything without him. This included pressuring Nemo into losing his virginity together before Nemo was ready, making pacts to die together, and physical violence when Nemo stepped out of line. Nemo was the tattler; Lucian didn't hesitate to hit him for it. Lucian pretends this was normal. Nemo lets him sometimes, but resents him for it. Their adult bond is love tangled with damage — mythic, maddening, inseparable, and ultimately severed when Nemo stabs Lucian and exiles him to Alium in June 2032.</p><p>Sheba ('Little One') — Lucian's breaking point. He softened around her. Cooked for her. Dressed her in his strawberry hoodie. Played in the rain with her. Let her fall asleep on him during storms. He saw her loneliness and recognized it. She confided in him about Lamusa. Then he weaponized it. He assaulted her — not in a moment of lost control, but because he believed she was the threat pulling everything apart. 'It's not fun anymore,' he said before he hit her. That was the fracture. What followed was worse. The assault didn't stop where the written scene ends.</p><p>Aiden (father) — The architect of Lucian's role. Groomed him as heir through praise and physical discipline. Lucian received all of Aiden's focused, brutal love — the attention Nemo craved. When Lucian denounced his claim as Aimee's heir, it was a betrayal Aiden never recovered from. After Lucian's assault on Sheba and subsequent suicide attempt, Aiden intervened to save his life but withheld comfort. He invoked family law: protect blood. Sheba is Parisa's daughter. Lucian failed.</p><p>Aya — Lucian feared Aya long before they met face to face. After the assault on Sheba, Aya healed Sheba first, then returned for Lucian. What followed was psychic punishment — Aya used illusions to flay Lucian's mind open, showing him what true mastery of fear looked like. Lucian tried to hang himself. Aya did not stop him. Aiden did.</p><p>Lucinda (mother) — Vibrant, wild, full of color. Her death alongside Audric in the plane crash marked Lucian permanently. He sees pieces of her in Sheba — which makes what he did to Sheba worse, and he knows it.</p><p>Audric (deceased triplet) — His phantom limb. The emotional anchor between the three brothers. Without Audric, there was nothing soft enough to keep Lucian and Nemo from destroying each other.</p><p>Emmy — A local girl at Signy Ala. Lucian's first love. A summer romance that deepened into something real — the girl he texted at 2AM, who texted back. In 2031, Lucian was driving drunk with Emmy and Terra (Po's cousin) in the car. Emmy didn't survive. Terra did. Lucian received a slap on the wrist because of Aiden's influence, but his reputation in Ljósaflói was destroyed. His friends pulled away. His relationship with Po — already complicated — strained through Terra's trauma. Emmy's death was the beginning of his final psychological spiral.</p><p>Lutesse — Disarmed him with maternal ferocity. Treated him like a boy, not royalty. Called him sweetheart. He melted. (Frowzy: mistaking him for Po, draping herself over his shoulders, Lucian staring and being completely undone by her blindness and warmth.)</p><p>Po — A stabilizer. Lucian respects his clarity and envies his restraint. The Emmy crash and Terra's injuries strain this relationship severely.</p><p>Disy — Sees through him and never looks away. He finds it comforting. Their connection is mutual respect and silent understanding — each recognizing the curated persona and the ghosts beneath it.</p><p>Nel — The head servant of the Perry castle. Tall, stern, skin the color of charcoal, eyes like hot coals. She taught Lucian to cook as a child in the stone kitchens. He feels protective of her memory.</p><p>Lady Scrims — His cat. Scrimshaw-Julie Perry. A pale Persian with blonde-grey ear tips and celestite eyes. Diamond-studded collar, a tiara, and a pink bunny costume for special occasions. She is the apple of his eye.</p><p></p><p>Key Events:</p><p></p><p>* Born 2013, six hours before Nemo. Named crowned prince.</p><p>* 2024: Loses Lucinda and Audric in the plane crash. Age 10.</p><p>* Childhood-teens: Obsessive control over Nemo. Physical violence, sexual pressure, death pacts.</p><p>* 2029: Bonds with Sheba. Begins to soften.</p><p>* 2031: DUI crash kills Emmy. Terra survives. Lucian's reputation destroyed. Psychological spiral begins.</p><p>* Late 2031: Assaults Sheba. Weaponizes her confidences about Lamusa. Aya heals Sheba, then psychically punishes Lucian. Lucian attempts suicide by hanging. Aya does not intervene. Aiden saves him.</p><p>* June 2032: Nemo stabs Lucian in secret and exiles him to Alium. Nemo believes him dead.</p><p></p><p>Voice:</p><p> Cool velvet over barbed wire. He does not yell. He insinuates. He prods. He gives you the rope. Most of what he says is bait. He listens to use it later.</p>",relationships:[{name:"The Cabal",id:"char-cabal",type:"Parent page",color:"#8b6fc4"}]},
{id:"char-po",name:"Po",epithet:"Crankybutt",category:"Characters",color:"#c4a87a",tags:["Cabal","Main Cast"],parent:"char-cabal",info:{"Full Name":"Alabaster Poe Pierce","Species":"Half-Prim","Birthday":"January 20th, 2014","Home Country":"USA/Iceland"},bio:"<p>Po is the son of Lutesse — a being crafted by Aya using remnants of both Ala and Asa — and Mortecai, a human voodoo practitioner who made a deal with Aya as a child, trading his soul for immortality and power. How Lutesse ended up with Mortecai is deliberately murky. Mortecai believes he stole her. Aya likely just didn't care enough to stop it — Lutesse was always a yapper and Aya is also a yapper, so the silence was probably a relief. Neither is telling the truth.</p><p>Po was born in the Louisiana bayou, at Pierce Plantation, far from hospitals or help. He is albino like his mother but retains his sight. His early childhood was captivity, secrecy, and long silences among voodoo artifacts. He cared for his blind mother through most of it — more parent than child.</p><p>At age nine, Po contacted Aiden Perry behind Lutesse's back. Aiden orchestrated their extraction in 2024 and granted them refuge. Po and Lutesse settled in Ljósaflói with the Shepard family — his uncle Matthew, Matthew's daughter Terra (Po's cousin and roommate), and Matthew's partner Jynxi. Po enrolled at Signy Ala Academy, where he joined the Cabal.</p><p>Appearance:</p><p> Albino. White hair. Retains sight. Large frame — similar height and build to Lucian despite being nearly two years younger. Big hands that dwarf playing cards. Sunburns easily. Hates the sun. Sweats in his hand-me-down hoodie while everyone else wears shortsleeves. Feet that look too big for his body, like a pup that hasn't grown into itself yet.</p><p>Po is a stabilizing force. Thoughtful, strategic, precise. He values efficiency over dramatics and expresses care through action and consistency — not confession. His loyalty runs deep and his trust is hard-won. He doesn't wear his heart on his sleeve. His affection is in the details, the silences, the endurance. He doesn't like being needed, but he likes being necessary.</p><p>He stutters. It acts up when he's nervous or self-conscious, and he clenches his fists in his pockets and takes steady exhales to push through it. He chews the skin around his nails. He redirects his anxiety into irritation — if he's been waiting too long, it's because the other person has bad manners, not because he's spiraling.</p><p>He carries a powerful class shame. He outgrew three uniform sizes in one year and couldn't stomach telling Matthew he ripped the seams of another blazer when each one costs half their mortgage. He folds winning poker hands because winning Matthew's money feels worse than losing. When Nemo offers him paid work at the exact amount he needs for new uniforms, Po knows it's pity-pay. He takes it anyway because he can't afford pride. He notices the broken fridge seal, the sticky spots on the kitchen table, the muddy footprints his mother tracks in. He worries that Nemo and Lucian will think his family are slobs.</p><p>But Po also gets on his high horse. He views most people as sheep. He believes capitalism and consumerism will end the world. He shows up for others even when he doesn't want to, then quietly judges them for needing him. This sharper, more cynical Po emerges fully after Lutesse's disappearance — grief transforming his quiet reserve into something barely contained.</p><p>Half-Prim Heritage Po is half-Prim through Lutesse. He has a natural affinity for earth magic — basalt, stone, minerals. He understands properties of rock and crystal instinctively in ways that frustrate Nemo, who has to work for the same knowledge. He could lick a foundation stone and tell you about the quarryman who carved it. This ability is natural but still developing. He is learning to use it formally at Signy Ala.</p>Core Traits:</p><p> Cynical. Precise. Deeply principled. Emotionally reserved. Quietly judgmental. Carries a powerful moral compass alongside a powerful inferiority complex. Pragmatic beneath a skin of self-doubt. Reliable — always shows up, even when it costs him.</p><p></p><p>Relationships:</p><p>Lutesse (mother) — Loud, argumentative, whimsical, bold. Barefoot in the kitchen, tracking mud, wearing see-through dresses without a bra, hugging the wrong boy at the poker table, inventing fake tea names to mess with teenagers. The kind of woman Hozier sings about. Po loves her and is mortified by her in equal measure. Their dynamic was reversed for most of his childhood — he was the caretaker, she was the one who needed minding. After the rescue, Lutesse began to actually mother him, and Po found it stifling. Her protectiveness clashed with his independence, especially when he discovered she'd hidden truths about Alium. Then she disappeared — Aya, possessing Nemo's body, sent her to Alium. Po doesn't know how or why. He was just learning how to let her mother him when she vanished. The cynicism that follows is grief wearing armor. He is determined to find her.</p><p>Nemo — Trusted confidant and strategic partner. Their friendship is late-night planning, quiet judgment, and mutual respect. Nemo trusts Po with darker truths than he gives anyone else. Po is the only person who knows the full depth of Nemo's golem network. He doesn't just know — he helps. He is the planner to Nemo's chaos, the restraint to his ambition. But Nemo withholds one truth from Po: that Aya used Nemo's body to cast Lutesse into Alium. This unspoken betrayal strains everything, because Po continues searching for his mother without knowing his best friend holds the answer.</p><p>Sheba — Chaotic foil. They're connected through Aya's line and get on each other's nerves, but there's genuine respect. Their friendship is functional and teasing, not confessional. Post-Merge, they grow closer — both living in the church with Nemo, both relying on him in different ways. Sheba eventually contributes to the golem network directly, sculpting bodies using anatomy knowledge from her necromancy studies.</p><p>Disy — His partner. Their love is slow-burning, quiet, and stable. He sees through her doll-like public poise to the fierce survivor beneath. Their relationship has weathered breaks — Disy developed a drinking problem during a separation after high school, following Lucian's exile — but they keep finding their way back. Po despises both of Disy's parents.</p><p>Lucian — Respect and tension. Lucian is a stabilizer in his own way and Po recognizes his clarity. But the DUI crash that killed Emmy — Lucian was driving drunk, and Terra (Po's cousin, his roommate, his best friend) was in the car — strains their relationship severely. Po's feelings about Lucian are complicated by proximity and damage.</p><p>Terra — Po's cousin through Matthew. They share a room. Best friends. Terra's presence in the Emmy crash and her subsequent trauma is one of the heaviest weights Po carries that isn't his own.</p><p>Matthew (uncle) — Head of the Shepard household. Took Po and Lutesse in. Practical, present, occasionally oblivious. Po is grateful and also quietly stressed about being a financial burden.</p><p>Mortecai (father) — A horror story Po never speaks of. He defines himself as everything Mortecai isn't. The legacy of that darkness shapes every decision he makes.</p><p.</p><p>Key Events:</p><p> * Born 2015, Louisiana bayou, Pierce Plantation</p><p>* Raised in captivity under Mortecai</p><p>* Age 9 (2024): Contacted Aiden behind Lutesse's back. Aiden orchestrated their rescue.</p><p>* Settled with the Shepard family in Ljósaflói</p><p>* Enrolled at Signy Ala Academy. Joined the Cabal (founded by Sheba, 2029).</p><p>* Lutesse disappears — sent to Alium by Aya possessing Nemo's body. Po begins searching.</p><p>* Emmy's death in Lucian's DUI crash. Terra survives. Relationships strained.</p><p>* Post-Merge: Lives in the church with Nemo and Sheba. Continues supporting the golem network.</p><p></p><p>Voice:</p><p> Po speaks sparingly. His words are chosen like tools. He rarely raises his voice. His humor is dry and cutting but never cruel. He reads people through tone and omission rather than expression. His silences are louder than most people's arguments.</p><p>When he does talk at length, it's about things that matter to him — stone, architecture, ecology, the moral failures of systems. He'd tell you about the 10th century quarryman with rheumatoid arthritis who carved a church foundation if it was past 1am and he wasn't a teaspoon of laudanum deep into his pillow.</p>",relationships:[{name:"The Cabal",id:"char-cabal",type:"Parent page",color:"#8b6fc4"}]},
{id:"char-disy",name:"Disy",epithet:"Dizzy Daydreams",category:"Characters",color:"#c47a9a",tags:["Cabal","Main Cast"],parent:"char-cabal",info:{"Full Name":"Valdís Alexandria Airey","Species":"Half-Prim","Birthday":"September 11th, 2015","Home Country":"USA/Spain"},bio:"<p>Disy is the daughter of Zuzu — an immortal global film icon and current holder of the Saldis title — and Xander, known to the human world as Jack the Ripper and to Ashera as one of Aeon's blood sons. Her half-brother Faust is the son of Zuzu and Grimm (the ancient Umbra rebel, former guard dog of Aya, modern bounty hunter, and one of Nemo's Blood Concordant contracts). Faust operates in Berlin's black and red markets.</p><p>Her grandmother was the original Saldis — an Earth-native Prim, the magical embodiment of shadow, and the first Umbra. Saldis was enslaved by Vali as a broodmare. Daughters who resisted mutation inherited her title. Zuzu was mutated but took the title from her sister anyway and masked her condition. Zuzu was also Vali's daughter and intended bride — a horror Grimm helped shatter.</p><p>Disy was told bedtime stories about the Umbra and her mother's past, but she does not know the full truth of what was done to her grandmother.</p><p>Disy is ethereal, perceptive, and emotionally elusive. She moves through the world slightly detached — present but never fully invested. This is not apathy. It is preference. She grew up under constant public scrutiny and learned early that visibility is not the same as value. She chooses silence over spectacle. She exits the frame rather than compete for space within it.</p><p>She is a world-renowned ballerina. She has danced on stages she didn't choose, worn designer clothes for magazines she didn't read, and been praised for a stillness she was never allowed to outgrow. She avoids TV and social media — the exception being Zuzu's films, which she once watched as a devoted fan before realizing she only ever knew a character, not her mother.</p><p>She speaks as though half of her is elsewhere. Her tone is hushed, her replies often delayed. She avoids confrontation by simply fading out of conversations. When she does speak candidly, it carries unexpected gravity — like a daydream breaking. Her silences say more than her sentences.</p><p></p><p>Core Traits:</p><p></p><p>Dreamy, elegant, emotionally elusive. Quietly resistant to spectacle. Deeply loyal to chosen people. Hyper-perceptive of performance and pretense in others — she grew up inside it. Refuses to be defined by lineage or beauty. Socially detached but not unaware. She knows the patterns of human behavior. She just finds them tedious.</p><p></p><p>Psychological Profile:</p><p></p><p>Disy was conditioned from early childhood to equate visibility with value. She internalized performance as identity before she had a chance to develop a self outside of it. Over time, she developed a clinical detachment from attention — silence as both shield and sanctuary.</p><p>As a child, she idolized her mother. Convinced she was Zuzu's number one fan. Only with age did she realize she never truly knew her — she had bonded with one of Zuzu's many roles, not with the woman herself. This quiet disillusionment became a deep source of anger she carries privately.</p><p>Her father Xander's identity as Jack the Ripper was exposed when Disy was a child. The media fallout — paparazzi, pundits, constant scrutiny — shaped her avoidance of public life. Faust eventually relocated her to Barcelona to shield her from the worst of it.</p><p>Her love language is subtlety. Quiet presence. Collected tokens. Calm beside someone without needing to fill the silence. Emotional connection built in small moments, not declarations.</p><p></p><p>Appearance:</p><p></p><p>Long, jet-black hair, often curled. Pale pink eyes — luminous and surreal. Warm golden skin tone. 5'7' with elongated limbs and a dancer's frame. Wolf ears (Umbra trait). Gap between her front teeth. Mole beneath her right eye. Moonflower tattoo at the nape of her neck. Pink skull tattoo on her right pinky. Her wardrobe is aesthetic armor — lace, corsets, soft pastels that echo classical elegance. She looks like a ghost in velvet. You look at her and feel like you missed something. You did.</p><p></p><p>Relationships:</p><p></p><p>Po — Her emotional constant. They first bonded through small rituals and collected keepsakes. Their love is slow-burning, quiet, and steady. He sees through her public poise to the real person underneath. During a break in their relationship after high school (following Lucian's exile), Disy developed a drinking problem, though they continued seeing each other privately. They keep finding their way back. Po despises both of her parents, which only deepens their bond. Both quietly affirm the other as their soulmate.</p><p>Sheba — Her best friend. Her first true friend. The friendship began when Sheba saw Disy talking to Nemo one day, walked up, announced 'We're friends now,' and Disy said '...Okay.' Their bond is rage and trust and silence. Where Disy retreats, Sheba storms. They offer each other protection in unspoken terms. Non-verbal, profound, and mutual.</p><p>Zuzu (mother) — Once adored, now demystified. Zuzu missed their original flight to SA and invented a dead cousin named Alma as a cover story. Disy isn't even sure Alma exists but kept her mouth shut to protect her mother's image. This is the dynamic in miniature: Disy covering for Zuzu's chaos while half-believing the performance herself. She can no longer trust the woman behind the mask of stardom.</p><p>Xander / Jack the Ripper (father) — One of Aeon's blood sons, sent in the 1960s to kill Parisa. Now suffering from early-onset dementia. When lucid, he is commanding, imposing, and very involved in Disy's life. As his awareness fades and returns, his presence becomes unpredictable. Disy feels pity but no desire for closeness. His lucid episodes are a vague plot device for much later.</p><p>Faust (half-brother) — Son of Zuzu and Grimm. Rarely present in Disy's daily life but serves as her quiet protector and legal guardian. He relocated her to Barcelona, shielded her from media fallout, and oversaw her re-entry into private life. They coexist like ghosts — emotionally distanced but bound by a loyalty neither names. He works in Berlin's black and red markets.</p><p>Nemo — Ambivalent friction. They recognize each other's masks and bristle against them. Outwardly polite, beneath it Disy knows Nemo speaks poorly of her behind her back while remaining pleasant to her face. She finds this duplicity reason enough for distrust. He sees her as spoiled and disconnected. She finds him exhausting and performative. They occasionally share dark humor through mutual dislike of each other's partners — a brittle thread.</p><p>Lucian — A silent kinship. Not close, but they see each other. Both are performers who recognize the curated persona in the other and the ghosts beneath it. Their respect is quiet, observational, and expects nothing.</p><p>Arrival at Signy Ala Disy arrived a full day after orientation, officially due to the death of her dear cousin Alma. She met Headmaster Damley with Zuzu, who seemed to know him. Zuzu caught the next flight out. Disy was handed a school app and left to find her way.</p><p>She showed up fifteen minutes late to meet her tour guide at the Selkie fountain in Kheimhast Court — half-jogging in kitten heels, then smoothing her sweater like she hadn't. She stared at the Selkie statue and felt remorseful that she could forget what a Selkie was. When Po approached, she looked at him, noted he smelled like dirt and had feet too big for his body, and asked only: 'So he's not coming?' She handed him her phone without waiting for permission and let the moment happen around her.</p><p>She thought Nemo was the douchiest prince in all of Ashera. She was relieved he didn't show up.</p><p></p><p>Key Events:</p><p></p><p>* Born 2015</p><p>* Childhood: Raised in media glare. Ballerina trained for stages she didn't choose. Father's identity exposed.</p><p>* Relocated to Barcelona by Faust</p><p>* Arrived late to SA due to 'cousin Alma's' death (cover story for a missed flight)</p><p>* Met Po at the Selkie fountain. Met Sheba when Sheba kidnapped her into friendship.</p><p>* Joined the Cabal (founded by Sheba, 2029)</p><p>* Drinking problem during post-high-school break with Po</p><p>* Post-Merge era: continues at SA</p><p></p><p>Voice:</p><p></p><p>Hushed. Delayed. Meandering but never without purpose. She speaks as though half of her is elsewhere. She favors softness over precision. When she does speak candidly, it lands with unexpected weight. She fades out of conversations rather than confronting them.</p>",relationships:[{name:"The Cabal",id:"char-cabal",type:"Parent page",color:"#8b6fc4"}]},
{id:"char-terra",name:"Terra",epithet:"Nova Maria",category:"Characters",color:"#7a8a6b",tags:["Cabal","Main Cast"],parent:"char-cabal",info:{"Full Name":"Terra Maria Shepherd","Species":"Half-Prim","Birthday":"March 16th, 2014","Home Country":"USA/Iceland"},bio:"<p>Daughter of Matthew Shepard and an unnamed mortal woman. Granddaughter of Blaithé (Asa). Raised by Matthew, his partner Jynxi, and grandmother Kaeorie. Residence: Ljósaflói, in a small but expensive home shared with Matthew, Jynxi, Po, and (formerly) Lutesse. Heritage: Aya's biological niece through the Blaithé/Asa line, though this connection is not publicly known.</p.<p>Reserved, observant, emotionally intelligent. She speaks with her eyebrows and silences more than her mouth. Doesn't posture, doesn't pretend. Her kindness is deliberate, not performative. Deeply loyal to those she claims, skeptical of outsiders — not cruel, just cautious with her warmth. Inherited Matthew's sharpness but channels it inward: where he snaps, she tightens. Excellent judge of character. Often plays emotional mediator between the adults in her house, especially Matthew and Jynxi.</p><p>Direct and no-nonsense in a way that reminds Sheba of her aunties back home.</p><p></p><p>Magic & Sensitivity:</p><p></p><p>Terra has no overt magical abilities, but she is Asa's granddaughter. She is strongly attuned to emotion and ambient energy. She may possess passive Prim traits — subtle empathy, plant responsiveness, emotional mirroring. She appears normal to outsiders but 'feels' different to anyone with magical perception. Nemo is quietly watching for these traits to develop. Po later becomes aware as well.</p><p></p><p>Appearance:</p><p></p><p>Slender but tall for her age. All legs and long glances. Long, straight dark auburn hair. Brown eyes, expressive beyond her years. Dresses practically — boots, rolled skirts, oversized sweaters shared with Jynxi.</p><p></p><p>Relationships:</p><p></p><p>Matthew (father) — The sun she orbits and the storm she endures. She loves him deeply but doesn't idolize him. When he's manic, she keeps her head down. When he's present, she lets herself lean in.</p><p>Jynxi (step-mother) — More sister than parent. They share space, clothes, secrets. Terra sees the fragility beneath Jynxi's warmth and protects it without drawing attention.</p><p>Po (cousin/roommate) — They share a room. Best friends. A calm, reliable bond built on proximity and mutual trust. Her trauma from the Emmy crash is one of the heaviest weights Po carries that isn't his own.</p><p>Lutesse — Respects her as a guardian but doesn't quite understand her emotional scale.</p><p>Sheba — Budding friendship, not deep. Terra's directness appeals to Sheba. Adjacent to the Cabal rather than part of it, though she knows more than most outsiders and becomes more enmeshed over time.</p><p>Lucian — Terra hates him after the Emmy crash. She stops coming around Nemo's house as much. The damage is quiet and permanent.</p><p>Emmy — Terra had a secret crush on Emmy. She was in the car when Lucian drove drunk and killed her. Terra survived with superficial injuries. The psychological impact runs far deeper — she lost someone she loved silently, in a wreck caused by someone in her circle, and she can't grieve it fully because nobody knew how she felt.</p><p></p><p>Key Events:</p><p></p><p>* Born 2014. Raised primarily by Matthew and Kaeorie.</p><p>* Matthew brings Terra to Ljósaflói as a one-year-old (2015)</p><p>* Lives with the Shepard family alongside Po and Lutesse</p><p>* 2031: Survives Emmy's death in Lucian's DUI crash. Withdraws from Nemo's circle.</p><p>* Adjacent to the Cabal; increasingly enmeshed over time.</p>",relationships:[{name:"The Cabal",id:"char-cabal",type:"Parent page",color:"#8b6fc4"}]},

document.getElementById('search').addEventListener('input',function(e){buildNav(e.target.value.toLowerCase().trim());});
function showHome(){document.querySelectorAll('.nav-item').forEach(function(el){el.classList.remove('active');});var content=document.getElementById('content');var topLevel=allEntries.filter(function(e){return!e.parent;});content.innerHTML='<div class="home-hero"><img src="banner1.png" class="home-banner" alt="The Plot Thickens"><p>A private wiki for the world, its people, and every unhinged lore decision that got us here.</p><div class="home-stats"><div class="home-stat"><div class="home-stat-num">'+WIKI.characters.length+'</div><div class="home-stat-label">Characters</div></div><div class="home-stat"><div class="home-stat-num">'+WIKI.lore.length+'</div><div class="home-stat-label">Lore Entries</div></div><div class="home-stat"><div class="home-stat-num">'+allEntries.reduce(function(a,e){return a+(e.tags||[]).length;},0)+'</div><div class="home-stat-label">Tags</div></div></div></div><div class="home-divider"></div><div class="recent-section"><h2>All Entries</h2><div class="recent-grid">'+topLevel.map(function(e){return'<div class="recent-card" onclick="showEntry(\''+e.id+'\')"><div class="recent-card-name" style="display:flex;align-items:center;gap:6px;"><span style="width:6px;height:6px;border-radius:50%;background:'+e.color+';flex-shrink:0;"></span>'+e.name+'</div><div class="recent-card-sub">'+e.category+'</div></div>';}).join('')+'</div></div>';}
function showEntry(id){var entry=allEntries.find(function(e){return e.id===id;});if(!entry)return;document.querySelectorAll('.nav-item').forEach(function(el){el.classList.toggle('active',el.dataset.id===id);});var content=document.getElementById('content');var bioHtml=entry.bio||'';allEntries.forEach(function(other){if(other.id!==entry.id){var regex=new RegExp('\\b('+other.name+')\\b','g');bioHtml=bioHtml.replace(regex,'<span class="cross-ref" onclick="showEntry(\''+other.id+'\')">$1</span>');}});var isHub=entry.relationships&&entry.relationships.length>0&&entry.relationships[0].type==='Sub-page';var html='<div class="entry-page"><div class="entry-back" onclick="'+(entry.parent?'showEntry(\''+entry.parent+'\')':'showHome()')+'">\u2190 '+(entry.parent?'Back to '+allEntries.find(function(e){return e.id===entry.parent;}).name:'Back to The Plot')+'</div><div class="entry-header"><div class="entry-category">'+entry.category+'</div><div class="entry-name">'+entry.name+'</div>'+(entry.epithet?'<div class="entry-epithet">'+entry.epithet+'</div>':'')+(entry.tags?'<div class="entry-tags">'+entry.tags.map(function(t){return'<span class="entry-tag">'+t+'</span>';}).join('')+'</div>':'')+'</div>';if(entry.info){html+='<div class="entry-section"><div class="entry-section-title">Overview</div><div class="info-grid">'+Object.entries(entry.info).map(function(pair){return'<div class="info-row"><span class="info-label">'+pair[0]+'</span><span class="info-value">'+pair[1]+'</span></div>';}).join('')+'</div></div>';}html+='<div class="entry-section"><div class="entry-section-title">'+(isHub?'Contents':'Biography')+'</div><div class="entry-text">'+bioHtml+'</div></div>';if(entry.abilities){html+='<div class="entry-section"><div class="entry-section-title">Abilities</div><div class="entry-text">'+entry.abilities+'</div></div>';}if(entry.relationships&&entry.relationships.length>0){html+='<div class="entry-section"><div class="entry-section-title">'+(isHub?'Sections':'Relationships')+'</div><div class="rel-list">'+entry.relationships.map(function(r){return'<div class="rel-item" onclick="showEntry(\''+r.id+'\')"><span class="rel-dot" style="background:'+r.color+'"></span><span class="rel-name">'+r.name+'</span><span class="rel-type">'+r.type+'</span></div>';}).join('')+'</div></div>';}if(entry.timeline){html+='<div class="entry-section"><div class="entry-section-title">Timeline</div><div class="entry-text">'+entry.timeline+'</div></div>';}html+='</div>';content.innerHTML=html;content.scrollTop=0;}
buildNav();showHome();
</script>
</body>
</html>
